<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo - Refacciones Don Juan</title>
    <link rel="stylesheet" href="estilos.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="header">
       <h1>Refacciones <span>Don Juan</span></h1>
        <p>Catálogo de Piezas</p>
    </div>

    <div class="navbar">
        <a href="index.html">Inicio</a>
        <a href="catalogo.html" class="active">Catálogo</a>
        <a href="carrito.html">Carrito</a>
        <a href="contacto.html">Contacto</a>
    </div>

    <div class="contenido">
        <h2>Nuestras Refacciones</h2>

        <div class="buscador-contenedor">
    <input type="text" id="inputBuscador" onkeyup="buscarProducto()" placeholder="Escribe la pieza que buscas...">
    <button onclick="buscarProducto()">Buscar</button>
</div>
        
        <div class="grid-productos">
            <div class="producto-card">
                <img src="imagenes/balatas.png" alt="Balatas">
                <h3>Balatas Delanteras</h3>
                <p class="precio">$850.00</p>
                <button class="btn-agregar" onclick="agregarAlCarrito('Balatas Delanteras', 850)">Agregar</button>
            </div>
            
            <div class="producto-card">
                <img src="imagenes/suspencion de carro.png" alt="Suspensión">
                <h3>Amortiguador</h3>
                <p class="precio">$1,200.00</p>
                <button class="btn-agregar" onclick="agregarAlCarrito('Amortiguador', 1200)">Agregar</button>
            </div>
            
            <div class="producto-card">
                <img src="imagenes/rin de carro.png" alt="Rin">
                <h3>Rin Deportivo</h3>
                <p class="precio">$2,500.00</p>
                <button class="btn-agregar" onclick="agregarAlCarrito('Rin Deportivo', 2500)">Agregar</button>
            </div>
            
            <div class="producto-card">
                <img src="imagenes/pieza de direccion.png" alt="Dirección">
                <h3>Terminal de Dirección</h3>
                <p class="precio">$450.00</p>
                <button class="btn-agregar" onclick="agregarAlCarrito('Terminal de Dirección', 450)">Agregar</button>
            </div>
        </div>
    </div>



    <script src="funciones.js"></script>
</body>
</html>
